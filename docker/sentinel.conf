# Redis Sentinel configuration for Hive
# Run with: redis-sentinel /path/to/sentinel.conf

port 26379
dir /data

# Sentinel monitor: name, master host, port, quorum
# Quorum = number of sentinels that must agree on master failure
sentinel monitor hive-redis redis_primary 6379 2

# Authentication
requirepass ${REDIS_PASSWORD}
sentinel auth-pass hive-redis ${REDIS_PASSWORD}

# Down-after period (5 seconds)
sentinel down-after-milliseconds hive-redis 5000

# Failover timeout (60 seconds)
sentinel failover-timeout hive-redis 60000

# Parallel syncs during failover
sentinel parallel-syncs hive-redis 1

# Auto-discovery of other sentinels
sentinel known-replica hive-redis redis_replica_1 6379
sentinel known-replica hive-redis redis_replica_2 6379
sentinel known-sentinel hive-redis redis_sentinel_2 26379
sentinel known-sentinel hive-redis redis_sentinel_3 26379

# Notification
sentinel notification-script hive-redis /usr/local/bin/sentinel-notify.sh

# Client reconfiguration
sentinel client-reconfig-script hive-redis /usr/local/bin/sentinel-reconfig.sh

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --prefix ../packages/a2a-sdk
      - run: npm ci
      - run: npx tsc --noEmit 2>&1 | grep -v TS2882 | (! grep -q "error TS")

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci --prefix ../packages/a2a-sdk
      - run: npm ci
      - run: npm run build
        env:
          DATABASE_URL: postgres://fake:fake@localhost:5432/fake
          AUTH_SECRET: ci-build-secret-not-real-at-least-32-chars
          AUTH_URL: http://localhost:3000
          ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p app/models/pilox-copilot-lora && echo "placeholder" > app/models/pilox-copilot-lora/README.md
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: app/Dockerfile
          push: false
          tags: pilox:${{ github.sha }}

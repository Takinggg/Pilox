# Example only — NATS *without* JetStream (core pub/sub). No stream setup required.
# Bridge must run with BRIDGE_NATS_MODE=core. See also p3-bridge-nats-smoke-job.example.yaml (JetStream).
# Periodic: p3-bridge-nats-smoke-cronjob-core.example.yaml (reuse Secret name below).
#
#   kubectl apply -f p3-bridge-nats-smoke-job-core.example.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: p3-bridge-nats-smoke-core
  namespace: default
type: Opaque
stringData:
  BRIDGE_INTERNAL_SECRET: "replace-with-same-secret-as-bridge-min-32-chars"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: p3-bridge-nats-smoke-core
  namespace: default
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          image: pilox-transport-bridge:local
          imagePullPolicy: IfNotPresent
          command: ["node", "scripts/p3-nats-smoke.mjs"]
          env:
            - name: BRIDGE_HTTP_URL
              value: "http://pilox-transport-bridge-bridge.default.svc.cluster.local:4081"
            - name: BRIDGE_NATS_URL
              value: "nats://nats.default.svc.cluster.local:4222"
            - name: BRIDGE_NATS_MODE
              value: "core"
            - name: SMOKE_NATS_MODE
              value: "core"
            - name: BRIDGE_NATS_SUBJECT
              value: "pilox.mesh.wan"
          envFrom:
            - secretRef:
                name: p3-bridge-nats-smoke-core

# Default values for Pilox App

replicaCount: 3

image:
  repository: ghcr.io/takinggg/pilox-app
  tag: latest
  pullPolicy: IfNotPresent
  pullSecrets: []

service:
  type: ClusterIP
  port: 3000
  annotations: {}

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: compress@kubernetescrd
  hosts:
    - host: pilox.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: pilox-tls
      hosts:
        - pilox.example.com

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
    ephemeral-storage: 10Gi
  requests:
    cpu: 1000m
    memory: 2Gi
    ephemeral-storage: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  targetEphemeralStorageUtilizationPercentage: 85

persistence:
  enabled: true
  size: 50Gi
  storageClass: fast-ssd
  accessMode: ReadWriteOnce

config:
  nodeEnv: production
  clientIpSource: xff_first

# External PostgreSQL configuration
postgresql:
  enabled: false
  host: postgres-primary.example.com
  port: 5432
  database: pilox
  username: postgres
  existingSecret: pilox-postgresql-secret
  secretKeys:
    password: password

# External Redis configuration
redis:
  enabled: false
  host: redis-primary.example.com
  port: 6379
  password:
    existingSecret: pilox-redis-secret
    secretKey: password
  sentinel:
    enabled: false
    serviceName: pilox-redis

# Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}
  imagePullSecrets: []

# Security
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: pilox-app
          topologyKey: kubernetes.io/hostname

# Service monitoring
monitoring:
  enabled: true
  prometheusRule:
    enabled: true
    namespace: ""
  serviceMonitor:
    enabled: true
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s

# IngressRoute for Traefik
ingressRoute:
  enabled: true
  middlewares:
    - name: compress
      namespace: kube-system
    - name: secure-headers
      namespace: kube-system

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2
  maxUnavailable: ""

# Network policies
networkPolicy:
  enabled: true
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 6379  # Redis
        - protocol: TCP
          port: 443   # HTTPS
        - protocol: TCP
          port: 80    # HTTP

# Auth configuration
auth:
  secret: ""
  nextauthUrl: ""

# Metrics service
metrics:
  service:
    enabled: true

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

# Environment variables (non-sensitive)
env:
  - name: NODE_ENV
    value: production
  - name: HIVE_CLIENT_IP_SOURCE
    value: xff_first

# Init containers
initContainers: []

# Sidecar containers
sidecarContainers: []

# Volumes
extraVolumes: []

# Volume mounts
extraVolumeMounts: []

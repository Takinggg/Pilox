apiVersion: v1
kind: List
metadata:
  name: pilox-app-tests
items:
  - apiVersion: v1
    kind: Pod
    metadata:
      name: {{ include "pilox-app.fullname" . }}-test-connection
      labels:
        {{- include "pilox-app.labels" . | nindent 8 }}
      annotations:
        helm.sh/hook: test
        helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded,hook-failed
    spec:
      restartPolicy: Never
      containers:
        - name: wget
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Testing Pilox App deployment..."
              wget -q --spider http://{{ include "pilox-app.fullname" . }}:{{ .Values.service.port }}/api/health || exit 1
              echo "Health check passed!"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

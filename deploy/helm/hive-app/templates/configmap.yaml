apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pilox-app.fullname" . }}
  labels:
    {{- include "pilox-app.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  HIVE_CLIENT_IP_SOURCE: {{ .Values.config.clientIpSource | quote }}
  {{- if .Values.config.logLevel }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  {{- end }}
  {{- if .Values.config.maxUploadSize }}
  MAX_UPLOAD_SIZE: {{ .Values.config.maxUploadSize | quote }}
  {{- end }}
  {{- if .Values.config.rateLimitWindowMs }}
  RATE_LIMIT_WINDOW_MS: {{ .Values.config.rateLimitWindowMs | quote }}
  {{- end }}
  {{- if .Values.config.rateLimitMax }}
  RATE_LIMIT_MAX: {{ .Values.config.rateLimitMax | quote }}
  {{- end }}
  {{- range $key, $value := .Values.config.extra }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}

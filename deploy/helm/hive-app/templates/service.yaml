apiVersion: v1
kind: Service
metadata:
  name: {{ include "pilox-app.fullname" . }}
  labels:
    {{- include "pilox-app.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "pilox-app.selectorLabels" . | nindent 4 }}
---
{{- if .Values.metrics.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pilox-app.fullname" . }}-metrics
  labels:
    {{- include "pilox-app.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/api/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "pilox-app.selectorLabels" . | nindent 4 }}
{{- end }}

{{- if and .Values.bridge.enabled .Values.bridge.metricsAuthSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pilox-transport-bridge.fullname" . }}-bridge-metrics
  labels:
    {{- include "pilox-transport-bridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: bridge
type: Opaque
stringData:
  bearer: {{ .Values.bridge.metricsAuthSecret | quote }}
{{- end }}

{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "pilox-mesh-gateway.fullname" . }}-rules
  labels:
    {{- include "pilox-mesh-gateway.labels" . | nindent 4 }}
    {{- with .Values.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: pilox-mesh-gateway
      rules:
        - alert: PiloxMeshGateway5xxRate
          expr: |
            sum(rate(hive_gateway_http_requests_total{code=~"5.."}[5m])) > 0.1
          for: {{ .Values.prometheusRule.for | quote }}
          labels:
            severity: warning
          annotations:
            summary: Pilox mesh gateway elevated HTTP 5xx rate
            description: Scraped from /v1/metrics; tune threshold for your SLO.
{{- end }}

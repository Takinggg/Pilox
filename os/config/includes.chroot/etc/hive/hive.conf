[general]
instance_name = Hive
version = 0.1.0

[network]
hostname = hive
domain = hive.local
port = 443

[docker]
socket = /var/run/docker.sock
network = hive-network

[database]
host = localhost
port = 5432
name = hive
user = hive

[redis]
host = localhost
port = 6379

[firecracker]
kernel = /var/lib/hive/firecracker/kernels/vmlinux
base_rootfs = /var/lib/hive/firecracker/rootfs/base-rootfs.ext4
instances_dir = /var/lib/hive/firecracker/instances
bridge = hive-br0
subnet = 10.0.96.0/19
default_vcpus = 1
default_memory_mib = 512
jailer_uid = 1500
jailer_gid = 1500
max_concurrent_creates = 5

[inference]
# GPU inference is provided by a shared host service (vLLM or Ollama).
# Agents access it via vsock — they never get direct GPU access.
# Auto-detected at first boot: if NVIDIA GPU present, service is started.
enabled = auto
# Backend: "vllm" or "ollama"
backend = ollama
# Host port for the inference API (proxied to agents via vsock)
port = 11434
# vsock port agents connect to from inside the VM
vsock_port = 11434
# Default model to load at startup
default_model = llama3.2

# Agent sleeping — auto-pause idle agents to free CPU
auto_sleep_enabled = true
auto_sleep_idle_seconds = 300

# Token tracking — count inference tokens per agent
token_tracking = true

# Quantization routing — route agents to Q4/Q8/FP16 based on tier
quantization_routing = false
tier_low_models =
tier_medium_models =
tier_high_models =

# vLLM settings (only used when backend = vllm)
vllm_max_sequences = 64
vllm_gpu_memory_util = 0.90
vllm_prefix_caching = true
vllm_speculative_model =

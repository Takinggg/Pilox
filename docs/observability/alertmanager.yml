# Minimal Alertmanager — à adapter (Slack, email, PagerDuty). Voir ALERTING.md.
global:
  resolve_timeout: 5m

route:
  receiver: default
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default
    # Exemple : webhook_configs: [{ url: "https://hooks.slack.com/services/..." }]

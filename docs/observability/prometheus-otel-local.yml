# Prometheus — scrape du exporter Prometheus du Collector (profil `otel` Hive).
# Alertmanager (même profil `otel` dans docker-compose) reçoit les alertes définies dans rules.hive.yml.
global:
  scrape_interval: 15s
  evaluation_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/rules.hive.yml

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
